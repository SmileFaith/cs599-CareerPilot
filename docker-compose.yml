version: '3.8'

services:
  fastapi:
    build: .
    container_name: careerpilot_api
    command: uvicorn src.api.main:app --host 0.000.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/memory.db
      - PYTHONPATH=/app
    restart: unless-stopped

  streamlit:
    build: .
    container_name: careerpilot_frontend
    command: streamlit run src/frontend/app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/memory.db
      - PYTHONPATH=/app
      - API_BASE_URL=http://fastapi:8000
    depends_on:
      - fastapi
    restart: unless-stopped

volumes:
  sqlite_data:
